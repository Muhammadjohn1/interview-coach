<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ec4a0"/>
      <stop offset="50%" style="stop-color:#3b9eff"/>
      <stop offset="100%" style="stop-color:#0ec4a0"/>
    </linearGradient>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080f20"/>
      <stop offset="100%" style="stop-color:#06080f"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" rx="85" fill="url(#bg4)"/>

  <!-- Circular container -->
  <circle cx="200" cy="175" r="115" fill="#0c0f1c" stroke="#1e2840" stroke-width="1.5"/>
  <circle cx="200" cy="175" r="115" fill="none" stroke="#0ec4a0" stroke-width="1" opacity="0.3"/>

  <!-- Voice waveform bars - center piece -->
  <rect x="90" y="160" width="12" height="30" rx="6" fill="url(#g1)" opacity="0.5"/>
  <rect x="110" y="148" width="12" height="54" rx="6" fill="url(#g1)" opacity="0.6"/>
  <rect x="130" y="138" width="12" height="74" rx="6" fill="url(#g1)" opacity="0.75"/>
  <rect x="150" y="128" width="12" height="94" rx="6" fill="url(#g1)" opacity="0.85"/>
  <rect x="170" y="118" width="12" height="114" rx="6" fill="url(#g1)"/>
  <rect x="190" y="108" width="20" height="134" rx="10" fill="url(#g1)"/>
  <rect x="218" y="118" width="12" height="114" rx="6" fill="url(#g1)"/>
  <rect x="238" y="128" width="12" height="94" rx="6" fill="url(#g1)" opacity="0.85"/>
  <rect x="258" y="138" width="12" height="74" rx="6" fill="url(#g1)" opacity="0.75"/>
  <rect x="278" y="148" width="12" height="54" rx="6" fill="url(#g1)" opacity="0.6"/>
  <rect x="298" y="160" width="12" height="30" rx="6" fill="url(#g1)" opacity="0.5"/>

  <!-- Mic icon overlay center -->
  <circle cx="200" cy="175" r="28" fill="#06080f" stroke="#0ec4a0" stroke-width="2"/>
  <rect x="191" y="158" width="18" height="28" rx="9" fill="#0ec4a0"/>
  <path d="M186 178 Q186 196 200 196 Q214 196 214 178" fill="none" stroke="#0ec4a0" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="200" y1="196" x2="200" y2="204" stroke="#0ec4a0" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Brand name -->
  <text x="200" y="330" font-family="Georgia, serif" font-size="50" font-weight="700"
